<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord 通知监控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #333;
  }
  .header h1 { font-size: 1.4rem; color: #7289da; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #43b581;
    box-shadow: 0 0 8px #43b581;
    animation: pulse 2s infinite;
  }
  .status-dot.disconnected { background: #f04747; box-shadow: 0 0 8px #f04747; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .stats {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-card {
    background: #16213e;
    border: 1px solid #2d2d4e;
    border-radius: 10px;
    padding: 12px 20px;
    min-width: 130px;
  }
  .stat-card .label { font-size: .75rem; color: #888; margin-bottom: 4px; }
  .stat-card .value { font-size: 1.4rem; font-weight: 700; color: #7289da; }
  .messages {
    display: flex; flex-direction: column; gap: 10px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .message-card {
    background: #16213e;
    border: 1px solid #2d2d4e;
    border-left: 3px solid #7289da;
    border-radius: 8px;
    padding: 12px 16px;
    animation: slideIn .3s ease;
  }
  .message-card.new { border-left-color: #43b581; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
  .msg-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .msg-sender { font-weight: 600; color: #7289da; font-size: .9rem; }
  .msg-channel { font-size: .75rem; color: #888; background: #0f3460; padding: 2px 8px; border-radius: 10px; }
  .msg-time { font-size: .72rem; color: #555; }
  .msg-body { font-size: .92rem; line-height: 1.5; color: #ddd; }
  .empty-state {
    text-align: center; color: #555; padding: 60px 20px;
    font-size: .9rem;
  }
  .conn-status { font-size: .8rem; color: #888; }
</style>
</head>
<body>
<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>Discord 通知监控</h1>
  <span class="conn-status" id="connStatus">连接中...</span>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">收到消息</div>
    <div class="value" id="totalCount">0</div>
  </div>
  <div class="stat-card">
    <div class="label">SSE 状态</div>
    <div class="value" id="sseStatus" style="font-size:1rem">—</div>
  </div>
</div>

<div class="messages" id="messageList">
  <div class="empty-state" id="emptyState">等待 Discord 消息...</div>
</div>

<script>
const SERVER = 'http://localhost:8000';
let totalCount = 0;
let es = null;

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function addMessage(msg, isNew = true) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  totalCount++;
  document.getElementById('totalCount').textContent = totalCount;

  const list = document.getElementById('messageList');
  const card = document.createElement('div');
  card.className = 'message-card' + (isNew ? ' new' : '');

  const channel = msg.subtitle || msg.bundleId || 'Discord';
  const sender  = msg.title || '未知';
  const body    = msg.message || '';
  const time    = formatTime(msg.deliveredAt);

  card.innerHTML = `
    <div class="msg-header">
      <span class="msg-sender">@${sender}</span>
      <span class="msg-channel">${channel}</span>
    </div>
    <div class="msg-body">${body}</div>
    <div class="msg-time">${time} · record_id: ${msg.recordId || '—'}</div>
  `;

  list.insertBefore(card, list.firstChild);
  // 最多显示 100 条
  while (list.children.length > 100) list.removeChild(list.lastChild);
}

function connect() {
  if (es) es.close();

  const clientId = 'web-' + Math.random().toString(36).substr(2, 8);
  es = new EventSource(`${SERVER}/api/notifications/discord/stream?clientId=${clientId}`);

  es.addEventListener('open', () => {
    document.getElementById('statusDot').classList.remove('disconnected');
    document.getElementById('connStatus').textContent = 'SSE 已连接';
    document.getElementById('sseStatus').textContent = '✅ 已连接';
  });

  es.addEventListener('discord-message', e => {
    try { addMessage(JSON.parse(e.data), true); } catch(err) { console.error(err); }
  });

  es.addEventListener('history', e => {
    try {
      const msgs = JSON.parse(e.data);
      msgs.reverse().forEach(m => addMessage(m, false));
    } catch(err) { console.error(err); }
  });

  es.onerror = () => {
    document.getElementById('statusDot').classList.add('disconnected');
    document.getElementById('connStatus').textContent = 'SSE 断开，5秒后重连...';
    document.getElementById('sseStatus').textContent = '❌ 断开';
    es.close();
    setTimeout(connect, 5000);
  };
}

connect();
</script>
</body>
</html>
